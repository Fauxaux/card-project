<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生日快乐</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "微软雅黑", sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.5s;
  }

  /* 三种风格背景 */
  .style-pink {
    background: linear-gradient(120deg, #ffe6ee, #ffd6e0);
  }
  .style-blue {
    background: linear-gradient(120deg, #e6f4ff, #cce8ff);
  }
  .style-gold {
    background: linear-gradient(120deg, #fff9e6, #fff2cc);
  }

  .card {
    background: #fff;
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 400px;
    margin: 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 15px;
  }

  .style-pink h1 { color: #ff6b81; }
  .style-blue h1 { color: #409eff; }
  .style-gold h1 { color: #d4af37; }

  p {
    font-size: 18px;
    color: #555;
    line-height: 1.8;
    margin: 10px 0;
  }

  .cake {
    font-size: 60px;
    margin: 20px 0;
  }

  .footer {
    margin-top: 30px;
    font-size: 14px;
    color: #999;
  }
</style>
</head>
<body>
<div class="card">
  <div class="cake">🎂</div>
  <h1>生日快乐，<span id="name"></span>！</h1>
  <p>今天是你的生日：<span id="birthday"></span></p>
  <p>愿你每一天都开开心心，健康平安，万事顺意！</p>
  <p>✨ 专属你的生日祝福 ✨</p>
  <div class="footer">from 你的朋友</div>
</div>

<script>
// 读取 URL 参数
const params = new URLSearchParams(window.location.search);
const name = params.get("n") || "朋友";
const birthday = params.get("b") || "未知";
const style = params.get("s") || "pink";

// 插入内容
document.getElementById("name").textContent = name;
document.getElementById("birthday").textContent = birthday;

// 应用风格
document.body.classList.add("style-" + style);
</script>
</body>
</html>
