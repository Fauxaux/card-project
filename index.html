<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制作专属生日祝福 🎁</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>

    <style>
        /* 全局样式与柔和的生日氛围渐变背景 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #ffeef4 0%, #fff1f1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 毛玻璃卡片容器 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(255, 107, 129, 0.12);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h2 {
            color: #2f3542;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #747d8c;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* 输入框区域 */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #57606f;
            font-size: 14px;
            font-weight: 500;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #f1f2f6;
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #2f3542;
            text-align: center;
        }

        input:focus {
            border-color: #ff6b81;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 107, 129, 0.1);
        }

        /* 绚丽的柔光渐变按钮 */
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.35);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 117, 140, 0.45);
        }

        /* 二维码弹出区域 */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        #qr-container {
            margin-top: 30px;
            display: none;
        }
        #qr-container.show {
            display: block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .qr-box {
            background: white;
            padding: 16px;
            border-radius: 18px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border: 1px solid #f1f2f6;
        }
        
        #qrcode img {
            margin: 0 auto;
        }

        .qr-tip {
            margin-top: 14px;
            font-size: 13px;
            color: #ff6b81;
            font-weight: 500;
        }

        /* 自定义日历弹窗样式，使其完美融合粉色主题 */
        .flatpickr-calendar {
            border-radius: 16px !important;
            box-shadow: 0 10px 25px rgba(255, 107, 129, 0.15) !important;
            border: 1px solid rgba(255, 107, 129, 0.1) !important;
        }
        .flatpickr-day.selected, .flatpickr-day.selected:hover {
            background: #ff6b81 !important;
            border-color: #ff6b81 !important;
        }
        .flatpickr-months .flatpickr-month {
            color: #2f3542 !important;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>制作专属生日祝福 🎁</h2>
        <div class="subtitle">输入基本信息，一键生成惊喜二维码</div>
        
        <div class="input-group">
            <span class="input-label">好友昵称：</span>
            <input type="text" id="nickname">
        </div>

        <div class="input-group">
            <span class="input-label">出生日期：</span>
            <input type="text" id="birthdate" readonly>
        </div>
        
        <button onclick="generateQR()">生成惊喜二维码</button>

        <div id="qr-container">
            <div class="qr-box">
                <div id="qrcode"></div>
            </div>
            <div class="qr-tip">✨ 微信扫一扫，解锁生日惊喜 ✨</div>
        </div>
    </div>

    <script>
        // 初始化中文日历
        flatpickr("#birthdate", {
            locale: "zh",
            dateFormat: "Y-m-d",
            disableMobile: "true" // 强制在手机端也使用高颜值的自制中文日历
        });

        function generateQR() {
            const nickname = document.getElementById('nickname').value.trim();
            const birthdate = document.getElementById('birthdate').value;
            
            if (!nickname || !birthdate) {
                alert("把昵称和出生日期都填好，惊喜才完整哦！💗");
                return;
            }

            // 【重要：记得把下面的“你的仓库名”改成你实际的 GitHub 仓库名称】
            // 目标文件已由 blessing.html 变更为 view.html
            const baseUrl = "https://fauxaux.github.io/card-project/view.html"; 
            
            const targetUrl = baseUrl + "?name=" + encodeURIComponent(nickname) + "&date=" + encodeURIComponent(birthdate);

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 220,
                height: 220,
                colorDark : "#2f3542",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });

            document.getElementById("qr-container").classList.add("show");
        }
    </script>

</body>
</html>
