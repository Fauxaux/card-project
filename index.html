<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制作生日祝福</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input, button { padding: 10px; margin: 10px; font-size: 16px; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <h2>生成你的专属生日祝福</h2>
    <input type="text" id="nickname" placeholder="请输入好友昵称">
    <br>
    <button onclick="generateQR()">生成二维码</button>

    <div id="qrcode"></div>

    <script>
        function generateQR() {
            const nickname = document.getElementById('nickname').value;
            if (!nickname) {
                alert("请先输入昵称哦！");
                return;
            }

            // 【重要修改】将下方网址替换为你自己的 GitHub Pages 地址
            // 假设你的用户名是 user，仓库是 repo，那么就是 https://user.github.io/repo/blessing.html
            const baseUrl = "https://fauxaux.github.io/card-project/blessing.html"; 
            
            // 将昵称拼接到网址后面作为参数，并进行编码防止乱码
            const targetUrl = baseUrl + "?name=" + encodeURIComponent(nickname);

            // 清空之前可能生成的二维码
            document.getElementById("qrcode").innerHTML = "";

            // 生成新的二维码
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
    </script>

</body>
</html>
