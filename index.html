<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>生成贺卡二维码</title>
<style>
  body {
    font-family: "Microsoft YaHei", sans-serif;
    padding: 20px;
    background: #f5f5f5;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  h2 {
    text-align: center;
  }
  .item {
    margin: 15px 0;
  }
  label {
    display: inline-block;
    width: 80px;
  }
  input {
    padding: 6px;
    width: 280px;
  }
  button {
    display: block;
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #0056b3;
  }
  #qrcode {
    margin-top: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h2>填写信息生成贺卡二维码</h2>

  <div class="item">
    <label for="name">昵称：</label>
    <input type="text" id="name" placeholder="请输入昵称" />
  </div>

  <div class="item">
    <label for="birthday">生日：</label>
    <input type="date" id="birthday" />
  </div>

  <div class="item">
    <label>风格：</label>
    <input type="radio" name="style" value="1" checked> 风格一
    <input type="radio" name="style" value="2"> 风格二
  </div>

  <button id="generate">点击生成二维码</button>

  <div id="qrcode"></div>
</div>

<!-- 关键：用稳定版 CDN（1.5.4） -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/lib/browser.min.js"></script>

<script>
document.getElementById("generate").addEventListener("click", function () {
  let name = document.getElementById("name").value.trim();
  let birthday = document.getElementById("birthday").value;
  let style = document.querySelector('input[name="style"]:checked').value;

  if (!name || !birthday) {
    alert("请填写昵称和生日！");
    return;
  }

  // 生成贺卡链接（确保是你自己的 GitHub Pages 地址）
  let cardURL = `https://fauxaux.github.io/card-project/view.html?n=${encodeURIComponent(name)}&b=${birthday}&s=${style}`;

  const qrcodeContainer = document.getElementById("qrcode");
  qrcodeContainer.innerHTML = ""; // 清空旧二维码

  // 第一种方案：用 QRCode.toCanvas（Promise 写法）
  QRCode.toCanvas(cardURL, {
    width: 200,
    height: 200,
    margin: 2,
    color: {
      dark: "#000000",
      light: "#ffffff"
    }
  })
  .then(canvas => {
    qrcodeContainer.appendChild(canvas);
  })
  .catch(err => {
    console.error("二维码生成失败：", err);
    alert("二维码生成失败，请稍后重试！");
  });
});
</script>

</body>
</html>
