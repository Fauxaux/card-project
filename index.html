<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制作专属生日祝福 🎁</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 全局样式重置与优雅的奶油粉渐变背景 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ffeef4 0%, #fff1f1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 节日感毛玻璃卡片容器 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(255, 107, 129, 0.12);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h2 {
            color: #2f3542;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #747d8c;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* 极简精致的输入框 */
        .input-group {
            margin-bottom: 22px;
        }
        input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #f1f2f6;
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #2f3542;
            text-align: center;
        }
        input:focus {
            border-color: #ff6b81;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 107, 129, 0.1);
        }

        /* 绚丽的柔光渐变按钮 */
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.35);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 117, 140, 0.45);
        }
        button:active {
            transform: translateY(0);
        }

        /* 二维码弹出动画区域 */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        #qr-container {
            margin-top: 30px;
            display: none;
        }
        #qr-container.show {
            display: block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 拍立得相片质感的二维码白框 */
        .qr-box {
            background: white;
            padding: 16px;
            border-radius: 18px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border: 1px solid #f1f2f6;
        }
        #qrcode img {
            margin: 0 auto;
        }

        .qr-tip {
            margin-top: 14px;
            font-size: 13px;
            color: #ff6b81;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>制作专属生日祝福 🎁</h2>
        <div class="subtitle">输入好友昵称，一键生成惊喜二维码</div>
        
        <div class="input-group">
            <input type="text" id="nickname" placeholder="想要祝福的好友昵称">
        </div>
        
        <button onclick="generateQR()">生成惊喜二维码</button>

        <div id="qr-container">
            <div class="qr-box">
                <div id="qrcode"></div>
            </div>
            <div class="qr-tip">✨ 微信扫一扫，解锁生日惊喜 ✨</div>
        </div>
    </div>

    <script>
        function generateQR() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                alert("请先输入好友的昵称哦！💗");
                return;
            }

            // 【重要：记得把下面的“你的仓库名”改成你实际的 GitHub 仓库名称】
            const baseUrl = "https://fauxaux.github.io/card-project/view.html"; 
            
            // 拼接参数
            const targetUrl = baseUrl + "?name=" + encodeURIComponent(nickname);

            // 清空旧的二维码
            document.getElementById("qrcode").innerHTML = "";

            // 生成新的二维码（保持 L 级别低容错率，防止长网址溢出崩溃）
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 220,
                height: 220,
                colorDark : "#2f3542",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });

            // 让二维码容器带着漂亮的动画显示出来
            const container = document.getElementById("qr-container");
            container.classList.add("show");
        }
    </script>

</body>
</html>
