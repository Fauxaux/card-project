
import os

project_dir = "/mnt/agents/output/birthday-qr"

fixed_index_html = '''<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 生日祝福二维码生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .btn-generate:active {
            transform: scale(0.98);
        }
        .qr-section {
            display: none;
            margin-top: 28px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .qr-section.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 16px;
        }
        .qr-hint {
            color: #888;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .btn-download {
            display: inline-block;
            padding: 10px 24px;
            background: #f0f0f0;
            color: #555;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-download:hover { background: #e0e0e0; }
        .preview-link {
            margin-top: 12px;
            font-size: 12px;
            color: #999;
            word-break: break-all;
            padding: 0 10px;
        }
        .emoji-deco {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .debug-info {
            margin-top: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            text-align: left;
            word-break: break-all;
        }
        .debug-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emoji-deco">🎂✨🎁</div>
            <h1>生日祝福二维码生成器</h1>
            <p>输入信息，生成专属生日祝福二维码</p>
        </div>

        <div class="form-group">
            <label>👤 寿星昵称</label>
            <input type="text" id="nickname" placeholder="例如：小明" maxlength="20">
        </div>

        <div class="form-group">
            <label>📅 生日日期</label>
            <input type="date" id="birthday">
        </div>

        <div class="form-group">
            <label>💌 祝福语（可选，留空使用默认）</label>
            <textarea id="message" placeholder="例如：愿你的每一天都充满阳光和欢笑！" maxlength="200"></textarea>
        </div>

        <button class="btn-generate" onclick="generateQR()">✨ 生成二维码</button>

        <div class="qr-section" id="qrSection">
            <div id="qrcode"></div>
            <p class="qr-hint">📱 用微信扫一扫，送上生日祝福</p>
            <button class="btn-download" onclick="downloadQR()">💾 保存二维码</button>
            <div class="preview-link" id="previewLink"></div>
            <div class="debug-info" id="debugInfo"></div>
        </div>
    </div>

    <script>
        function getBaseUrl() {
            let url = window.location.href;
            url = url.split('#')[0];
            url = url.split('?')[0];
            
            if (url.endsWith('/')) {
                return url;
            }
            
            const lastSlash = url.lastIndexOf('/');
            if (lastSlash !== -1) {
                url = url.substring(0, lastSlash + 1);
            }
            
            return url;
        }

        function generateQR() {
            const nickname = document.getElementById('nickname').value.trim();
            const birthday = document.getElementById('birthday').value;
            const message = document.getElementById('message').value.trim();

            if (!nickname) {
                alert('请输入寿星昵称！');
                return;
            }
            if (!birthday) {
                alert('请选择生日日期！');
                return;
            }

            const baseUrl = getBaseUrl();
            
            const params = new URLSearchParams();
            params.set('name', nickname);
            params.set('date', birthday);
            if (message) params.set('msg', message);

            const wishUrl = baseUrl + 'wish.html?' + params.toString();

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';

            new QRCode(qrContainer, {
                text: wishUrl,
                width: 220,
                height: 220,
                colorDark: '#333333',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('qrSection').classList.add('active');
            document.getElementById('previewLink').textContent = wishUrl;
            
            document.getElementById('debugInfo').innerHTML = 
                '<strong>当前页面URL:</strong> ' + window.location.href + '<br>' +
                '<strong>基础URL:</strong> ' + baseUrl + '<br>' +
                '<strong>二维码链接:</strong> ' + wishUrl;

            window.currentQRUrl = wishUrl;
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                alert('请先生成二维码！');
                return;
            }
            const link = document.createElement('a');
            link.download = '生日祝福二维码.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                generateQR();
            }
        });
    </script>
</body>
</html>'''

with open(os.path.join(project_dir, 'index.html'), 'w', encoding='utf-8') as f:
    f.write(fixed_index_html)

print("✅ index.html 已修复并保存！")
