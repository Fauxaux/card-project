<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日祝福二维码生成器 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden; /* 防止装饰气球超出视窗 */
        }

        /* 添加一些装饰性气球 */
        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            z-index: -1;
            animation: float 8s infinite ease-in-out;
        }
        .balloon:nth-child(1) { background: #ff6b6b; left: 10%; top: 15%; animation-delay: 0s; }
        .balloon:nth-child(2) { background: #4ecdc4; right: 15%; top: 25%; animation-delay: -2s; }
        .balloon:nth-child(3) { background: #ffd166; left: 20%; bottom: 20%; animation-delay: -4s; }
        .balloon:nth-child(4) { background: #6a0572; right: 25%; bottom: 10%; animation-delay: -6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15), 0 5px 15px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.description {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2);
        }

        button {
            padding: 14px 30px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(45deg, #ff5252, #ff7b38);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        #qrcode-container {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            display: none; /* 默认隐藏 */
        }

        #qrcode {
            margin: 0 auto;
            padding: 15px;
            background-color: white;
            border-radius: 10px;
            display: table; /* 让 div 居中 */
        }

        #qrcode-message {
            margin-top: 20px;
            color: #555;
            font-style: italic;
        }

        /* 添加一个简单的加载动画 */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-left-color: #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 扫描提示文字 */
        #scan-hint {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 装饰性气球 -->
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>

    <div class="container">
        <h1>🎉 生日祝福二维码 🎁</h1>
        <p class="description">输入您的姓名和生日，生成专属祝福二维码！</p>

        <div class="form-group">
            <label for="nickname">您的昵称:</label>
            <input type="text" id="nickname" placeholder="例如：小明">
        </div>

        <div class="form-group">
            <label for="birthday">您的生日:</label>
            <input type="date" id="birthday">
        </div>

        <button onclick="generateQR()">✨ 生成专属二维码 ✨</button>

        <div id="qrcode-container">
            <h3 style="color: #333; margin-bottom: 15px;">📱 扫描下方二维码</h3>
            <div id="qrcode"></div>
            <p id="qrcode-message">二维码生成成功！</p>
            <p id="scan-hint">用微信扫描上面的二维码，即可收到生日祝福！</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        let qrInstance = null;

        function generateQR() {
            const nickname = document.getElementById('nickname').value.trim();
            const birthdayInput = document.getElementById('birthday').value;

            if (!nickname || !birthdayInput) {
                alert("请填写完整的昵称和生日！");
                return;
            }

            // 格式化生日
            const birthdayDate = new Date(birthdayInput);
            const year = birthdayDate.getFullYear();
            const month = String(birthdayDate.getMonth() + 1).padStart(2, '0');
            const day = String(birthdayDate.getDate()).padStart(2, '0');
            const formattedBirthday = `${year}年${month}月${day}日`;

            // 构造消息
            const message = `祝 ${nickname} 生日快乐！\n\n生日: ${formattedBirthday}\n\n愿您天天开心，心想事成！`;

            const qrcodeDiv = document.getElementById('qrcode');

            // 清除旧二维码
            if(qrInstance) {
                qrInstance.clear();
                qrcodeDiv.innerHTML = "";
            }

            // 显示二维码容器
            document.getElementById('qrcode-container').style.display = 'block';

            // 生成新二维码
            qrInstance = new QRCode(qrcodeDiv, {
                text: message,
                width: 200,
                height: 200,
                colorDark: "#333",
                colorLight: "#fff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
