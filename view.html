<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐</title>
    <style>
        body {
            background-color: #ffe6e6; /* 淡淡的粉色背景 */
            text-align: center;
            font-family: 'Microsoft YaHei', sans-serif;
            padding-top: 30vh;
            margin: 0;
        }
        h1 {
            color: #ff4d4d;
            font-size: 2em;
            margin: 20px;
        }
        p {
            color: #666;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <h1 id="greeting">祝你生日快乐！</h1>
    <p>愿你新的一岁，平安喜乐，万事顺意！</p>

    <script>
        // 解析当前网址的参数
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');

        // 如果读取到了名字，就替换掉标题文本
        if (name) {
            document.getElementById('greeting').innerText = name + "，生日快乐！";
        }
    </script>

</body>
</html>
