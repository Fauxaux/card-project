<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐 🎂</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #ffeef4 0%, #fff1f1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 手机端全屏微动感卡片 */
        .blessing-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(255, 107, 129, 0.15);
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: floatUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .cake-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2.5s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff4d4d;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        /* 精致的出生日期展示标签 */
        .date-badge {
            background: rgba(255, 107, 129, 0.08);
            color: #ff6b81;
            padding: 8px 18px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px dashed rgba(255, 107, 129, 0.3);
            letter-spacing: 0.5px;
        }

        p {
            color: #57606f;
            font-size: 16px;
            line-height: 1.8;
        }
        
        .stars {
            color: #ffa502;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="blessing-card">
        <div class="cake-icon">🎂</div>
        <h1 id="greeting">祝你生日快乐！</h1>
        
        <div id="date-display" class="date-badge" style="display: none;"></div>
        
        <p>愿你新的一岁，眼里有光，心中有爱。所有的希望都能如愿，所有的美好都能相遇，平安喜乐，万事顺意！✨</p>
        <div class="stars">✨🎈🎉🎁🎉🎈✨</div>
    </div>

    <script>
        // 解析当前网址携带的参数
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const date = urlParams.get('date');

        if (name) {
            document.getElementById('greeting').innerText = name + "，生日快乐！";
        }

        if (date) {
            const dateParts = date.split('-'); 
            if (dateParts.length === 3) {
                const formattedDate = dateParts[0] + " 年 " + dateParts[1] + " 月 " + dateParts[2] + " 日";
                const dateDisplay = document.getElementById('date-display');
                dateDisplay.innerText = "🎂 出生日期：" + formattedDate;
                dateDisplay.style.display = 'inline-block'; 
            }
        }
    </script>

</body>
</html>
