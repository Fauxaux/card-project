<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生日贺卡</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: background 0.5s;
  }

  /* 风格1：温馨粉 */
  .style1 {
    background: linear-gradient(120deg, #ffeef8, #ffe6f2);
  }
  .style1 .card {
    background: #fff;
    color: #333;
    border: 2px solid #f8bbd0;
    box-shadow: 0 4px 12px rgba(248,187,208,0.3);
  }

  /* 风格2：清新蓝 */
  .style2 {
    background: linear-gradient(120deg, #eef6ff, #e0edff);
  }
  .style2 .card {
    background: #fff;
    color: #333;
    border: 2px solid #90caf9;
    box-shadow: 0 4px 12px rgba(144,202,249,0.3);
  }

  .card {
    width: 100%;
    max-width: 400px;
    border-radius: 16px;
    padding: 30px 20px;
    text-align: center;
  }

  .card h1 {
    font-size: 26px;
    margin-bottom: 15px;
  }
  .card p {
    font-size: 16px;
    line-height: 1.6;
    margin: 8px 0;
  }
  .heart {
    color: #e91e63;
  }
</style>
</head>
<body>
<div class="card">
  <h1>生日快乐 🎂</h1>
  <p>亲爱的 <strong id="name"></strong>：</p>
  <p>今天是你的生日：<strong id="birthday"></strong></p>
  <p>愿你每一天都开心、健康、平安顺遂！</p>
  <p class="heart">❤️ 特别的祝福给特别的你 ❤️</p>
</div>

<script>
// 读取 URL 参数：n=昵称&b=生日&s=风格
const params = new URLSearchParams(location.search);
const name = params.get("n") || "朋友";
const birthday = params.get("b") || "未知";
const style = params.get("s") || "1";

// 填入内容
document.getElementById("name").textContent = decodeURIComponent(name);
document.getElementById("birthday").textContent = birthday;

// 应用风格
document.body.classList.add(style === "2" ? "style2" : "style1");
</script>

</body>
</html>
